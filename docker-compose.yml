name: bus-ai-ticketing

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - bus-network

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - bus-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bus-network

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
    networks:
      - bus-network

  web:
    <<: *app-build
    command: npm run dev -w apps/web
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: /graphql
      GRAPHQL_URL: http://gateway:4000/graphql
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  gateway:
    <<: *app-build
    command: npm run dev -w services/gateway
    environment:
      TRIP_SERVICE_URL: http://trip-service:4010
      BOOKING_SERVICE_URL: http://booking-service:4020
      AI_SERVICE_URL: http://ai-service:4100
      ANALYTICS_SERVICE_URL: http://analytics-worker:4050
    ports:
      - "4000:4000"
    depends_on:
      trip-service:
        condition: service_started
      booking-service:
        condition: service_started
      ai-service:
        condition: service_started
      analytics-worker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/graphql',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({query:'{ health }'})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  trip-service:
    <<: *app-build
    command: npm run dev -w services/trip-service
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    ports:
      - "4010:4010"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  seat-service:
    <<: *app-build
    command: npm run dev -w services/seat-service
    environment:
      REDIS_URL: redis://redis:6379
      SEAT_GRPC_BIND: 0.0.0.0:50051
    ports:
      - "50051:50051"
    depends_on:
      redis:
        condition: service_healthy

  booking-service:
    <<: *app-build
    command: npm run dev -w services/booking-service
    environment:
      SEAT_GRPC_URL: seat-service:50051
      TRIP_SERVICE_URL: http://trip-service:4010
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      KAFKA_BROKERS: kafka:9092
    ports:
      - "4020:4020"
    depends_on:
      seat-service:
        condition: service_started
      trip-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4020/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  ai-service:
    <<: *app-build
    command: npm run dev -w services/ai-service
    environment:
      TRIP_SERVICE_URL: http://trip-service:4010
      BOOKING_SERVICE_URL: http://booking-service:4020
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "4100:4100"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  analytics-worker:
    <<: *app-build
    command: npm run dev -w workers/analytics-worker
    environment:
      KAFKA_BROKERS: kafka:9092
    ports:
      - "4050:4050"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4050/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20

  ticket-worker:
    <<: *app-build
    command: npm run dev -w workers/ticket-worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  email-worker:
    <<: *app-build
    command: npm run dev -w workers/email-worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      gateway:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - bus-network

networks:
  bus-network:
    driver: bridge
